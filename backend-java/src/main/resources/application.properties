# Python AI service (for PDF parsing)
ai.service.url=http://localhost:8000

# MySQL datasource (overridden by Docker env vars in container)
spring.datasource.url=jdbc:mysql://localhost:3306/easyshifts
spring.datasource.username=easyshifts
spring.datasource.password=easyshifts
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Persist sessions in MySQL so restarts don't invalidate logins
spring.session.store-type=jdbc
spring.session.jdbc.initialize-schema=always