<mat-card class="cards">

  <mat-card-title>Sign In</mat-card-title>

  <mat-card-content>
    <p>Use your Google account to connect gmail and google calendar.</p>
  </mat-card-content>

  <mat-card-actions>
    <button mat-raised-button color="primary" (click)="login()">
      Sign in with Google
    </button>
  </mat-card-actions>

</mat-card>
