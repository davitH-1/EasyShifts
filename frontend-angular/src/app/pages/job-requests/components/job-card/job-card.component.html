<mat-card [ngClass]="job.status" class="job-card" (click)="openJob()">

  <mat-card-title>
    {{ job.locationName }}
  </mat-card-title>

  <mat-card-content>
    <p>Date: {{ job.dateTime }}</p>

    <p>Start: {{ job.startTime }}</p>
    <p>End: {{ job.endTime }}</p>


    <p class="status">
      Status: {{ job.status }}
    </p>
  </mat-card-content>

</mat-card>
