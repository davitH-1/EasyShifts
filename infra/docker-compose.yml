services:

  frontend:
    build: ../frontend-angular
    ports:
      - "80:80"
    depends_on:
      - backend

  backend:
    build: ../backend-java
    ports:
      - "8080:8080"
    environment:
      SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      SPRING_AI_OLLAMA_BASE_URL: http://ollama:11434
      AI_SERVICE_URL: http://ai-python:8000
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/easyshifts
      SPRING_DATASOURCE_USERNAME: easyshifts
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD}
    depends_on:
      mysql:
        condition: service_healthy
      ai-python:
        condition: service_started
      ollama:
        condition: service_started

  ai-python:
    build: ../ai-python
    ports:
      - "8000:8000"
    environment:
      OLLAMA_HOST: ${OLLAMA_HOST:-http://ollama:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-gemma4:e2b}
    depends_on:
      - ollama

  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  mysql:
    image: mysql:8.4
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: easyshifts
      MYSQL_USER: easyshifts
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "easyshifts", "-p${MYSQL_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  ollama_data:
  mysql_data: